name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  BACKEND_IMAGE: ghcr.io/gorillaerne/go-backend
  FRONTEND_IMAGE: ghcr.io/gorillaerne/frontend-proxy

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build images
        run: |
          TAG=sha-$(git rev-parse --short HEAD)
          REF=${{ github.ref_name }}

          docker build \
            -t ${{ env.BACKEND_IMAGE }}:$TAG \
            -t ${{ env.BACKEND_IMAGE }}:$REF \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            ./Go_Refined_Code

          docker build \
            -f Go_Refined_Code/Dockerfile.nginx \
            -t ${{ env.FRONTEND_IMAGE }}:$TAG \
            -t ${{ env.FRONTEND_IMAGE }}:$REF \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            ./Go_Refined_Code

      - name: Push images
        run: |
          TAG=sha-$(git rev-parse --short HEAD)
          REF=${{ github.ref_name }}

          docker push ${{ env.BACKEND_IMAGE }}:$TAG
          docker push ${{ env.BACKEND_IMAGE }}:$REF
          docker push ${{ env.BACKEND_IMAGE }}:latest

          docker push ${{ env.FRONTEND_IMAGE }}:$TAG
          docker push ${{ env.FRONTEND_IMAGE }}:$REF
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push   # ← This ensures it runs after build-and-push
    steps:
      - name: 🚀 Deploy to server
        uses: appleboy/ssh-action@b60142998894e495c513803efc6d5d72a72c968a
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd devopsServer
            cd Devops_Gorillas
            cd Go_Refined_Code
            docker compose pull
            docker compose up -d
