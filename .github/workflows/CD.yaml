name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  BACKEND_IMAGE: ghcr.io/gorillaerne/go-backend
  FRONTEND_IMAGE: ghcr.io/gorillaerne/frontend-proxy

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build images
        run: |
          TAG=sha-$(git rev-parse --short HEAD)
          REF=${{ github.ref_name }}

          docker build \
            -t ${{ env.BACKEND_IMAGE }}:$TAG \
            -t ${{ env.BACKEND_IMAGE }}:$REF \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            ./Go_Refined_Code

          docker build \
            -f Go_Refined_Code/Dockerfile.nginx \
            -t ${{ env.FRONTEND_IMAGE }}:$TAG \
            -t ${{ env.FRONTEND_IMAGE }}:$REF \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            ./Go_Refined_Code

      - name: Push images
        run: |
          TAG=sha-$(git rev-parse --short HEAD)
          REF=${{ github.ref_name }}

          docker push ${{ env.BACKEND_IMAGE }}:$TAG
          docker push ${{ env.BACKEND_IMAGE }}:$REF
          docker push ${{ env.BACKEND_IMAGE }}:latest

          docker push ${{ env.FRONTEND_IMAGE }}:$TAG
          docker push ${{ env.FRONTEND_IMAGE }}:$REF
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to server
        run: |
          ssh root@${{ secrets.SERVER_IP }} << 'EOF'
            set -euo pipefail

            cd /Gorillaerne/Devops_Gorillas/Go_Refined_Code

            git fetch origin main
            git reset --hard origin/main

            docker compose pull
            docker compose up -d
          EOF
