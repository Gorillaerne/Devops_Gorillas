name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/go-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/frontend-proxy

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build images
        run: |
          TAG=sha-$(git rev-parse --short HEAD)
          REF=${{ github.ref_name }}

          docker build \
            -t ${{ env.BACKEND_IMAGE }}:$TAG \
            -t ${{ env.BACKEND_IMAGE }}:$REF \
            .

          docker build \
            -f Dockerfile.nginx \
            -t ${{ env.FRONTEND_IMAGE }}:$TAG \
            -t ${{ env.FRONTEND_IMAGE }}:$REF \
            .

      - name: Push images
        run: |
          TAG=sha-$(git rev-parse --short HEAD)
          REF=${{ github.ref_name }}

          docker push ${{ env.BACKEND_IMAGE }}:$TAG
          docker push ${{ env.BACKEND_IMAGE }}:$REF

          docker push ${{ env.FRONTEND_IMAGE }}:$TAG
          docker push ${{ env.FRONTEND_IMAGE }}:$REF