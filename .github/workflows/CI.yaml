name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          working-directory: ./Go_Refined_Code
          args: --config=./linters/.golangci.yml

  js-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run biome-linter
        uses: biomejs/setup-biome@v2.7
        with:
          version: latest
      - run: biome lint ./Go_Refined_Code/static/javaScript/

  go-test:
    runs-on: ubuntu-latest
    needs: [go-lint]
    defaults:
      run:
        working-directory: ./Go_Refined_Code
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: Go_Refined_Code/go.mod

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('Go_Refined_Code/go.sum') }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

  playwright-test:
    runs-on: ubuntu-latest
    needs: [js-lint]
    defaults:
      run:
        working-directory: ./Go_Refined_Code/tests/e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Go_Refined_Code/tests/e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

  e2e-docker:
    runs-on: ubuntu-latest
    needs: [go-lint, js-lint]
    defaults:
      run:
        working-directory: ./Go_Refined_Code/tests/e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create .env file
        working-directory: ./Go_Refined_Code
        run: |
          cat <<EOF > .env
          MYSQL_ROOT_PASSWORD=test_root_pw
          MYSQL_DATABASE=whoknowsdb
          MYSQL_USER=testuser
          MYSQL_PASSWORD=test_pw
          ADMIN_USERNAME=admin
          ADMIN_EMAIL=admin@test.com
          ADMIN_PASSWORD=adminpass123
          JWT_SECRET=ci_test_jwt_secret
          EOF

      - name: Start Docker Compose stack
        working-directory: ./Go_Refined_Code
        run: docker compose -f compose.dev.yml up -d --build

      - name: Wait for stack to be healthy
        working-directory: ./Go_Refined_Code
        run: |
          echo "Waiting for go-backend to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/search?q=test > /dev/null 2>&1; then
              echo "Backend is up"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 3
          done

      - name: Seed test data into pages table
        run: |
          docker exec mysql mysql -utestuser -ptest_pw whoknowsdb -e "
            INSERT IGNORE INTO pages (title, url, language, content, last_updated) VALUES
            ('Python', 'https://en.wikipedia.org/wiki/Python_(programming_language)', 'en', 'Python is a high-level general-purpose programming language. It is used widely in web development, data science, and automation.', NOW()),
            ('Docker', 'https://en.wikipedia.org/wiki/Docker_(software)', 'en', 'Docker is a platform for developing, shipping, and running applications in containers.', NOW()),
            ('JavaScript', 'https://en.wikipedia.org/wiki/JavaScript', 'en', 'JavaScript is a lightweight interpreted programming language used primarily for web development.', NOW()),
            ('Database', 'https://en.wikipedia.org/wiki/Database', 'en', 'A database is an organized collection of structured information or data stored electronically.', NOW());
          "

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Go_Refined_Code/tests/e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against Docker stack
        run: npx playwright test --config=playwright.docker.config.js

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: Go_Refined_Code/tests/e2e/playwright-report/

      - name: Tear down Docker Compose stack
        if: always()
        working-directory: ./Go_Refined_Code
        run: docker compose -f compose.dev.yml down

  build:
    runs-on: ubuntu-latest
    needs: [go-lint, js-lint, go-test, playwright-test, e2e-docker]
    defaults:
      run:
        working-directory: ./Go_Refined_Code
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: Go_Refined_Code/go.mod

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('Go_Refined_Code/go.sum') }}

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...
