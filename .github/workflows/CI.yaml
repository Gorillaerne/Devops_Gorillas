name: CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          working-directory: ./Go_Refined_Code
          args: --config=./linters/.golangci.yml

  build:
    runs-on: ubuntu-latest
    needs: go-lint  # This ensures build runs only if go-lint passes
    defaults:
      run:
        working-directory: ./Go_Refined_Code
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: Go_Refined_Code/go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('Go_Refined_Code/go.sum') }}

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...
