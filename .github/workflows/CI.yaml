name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          working-directory: ./Go_Refined_Code
          args: --config=./linters/.golangci.yml
  js-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run biome-linter
        uses: biomejs/setup-biome@v2.7
        with:
          version: latest
      - run: biome lint ./Go_Refined_Code/static/javaScript/

  build:
    runs-on: ubuntu-latest
    needs: [go-lint, js-lint]  # This ensures build runs only if go-lint passes
    defaults:
      run:
        working-directory: ./Go_Refined_Code
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: Go_Refined_Code/go.mod

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('Go_Refined_Code/go.sum') }}

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...
