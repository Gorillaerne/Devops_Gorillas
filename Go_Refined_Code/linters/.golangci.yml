version: "2"
run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - govet        
    - errcheck      
    - staticcheck   
    - unused        
    - revive        
    - gosec        
    - misspell      
    - bodyclose
formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
