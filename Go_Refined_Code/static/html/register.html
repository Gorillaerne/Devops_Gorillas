<!doctype html>
<html lang="da">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — ¿Who Knows?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" type="image/png" href="/monkgroup.png">
</head>

<body>

  <div class="page">
    <div class="navigation">
      <nav id="nav-bar">
        <h1>
          <a href="/">¿Who Knows?</a>
        </h1>
        <a id="nav-login" href="/login">Log in</a>
        <a id="nav-register" href="/register">Register</a>
      </nav>
    </div>

    <div class="body" id="body">
      <div class="form-page">
        <div class="form-container">

          <h2>Create account.</h2>
          <p class="form-sub">Join and start finding answers.</p>
          <span class="accent-line"></span>

          <form id="register-form">
            <dl>
              <div>
                <dt>Username</dt>
                <dd><input type="text" id="reg-username" name="username" size="30" placeholder="Choose a username" required></dd>
              </div>

              <div>
                <dt>E-Mail</dt>
                <dd><input type="email" id="reg-email" name="email" size="30" placeholder="you@example.com" required></dd>
              </div>

              <div>
                <dt>Password</dt>
                <dd><input type="password" id="reg-password" name="password" size="30" placeholder="••••••••" required></dd>
              </div>

              <div>
                <dt>Password <small>(repeat)</small></dt>
                <dd><input type="password" id="reg-password-confirm" name="password2" size="30" placeholder="••••••••" required></dd>
              </div>
            </dl>
            <div class="actions">
              <input type="submit" id="register-button" value="Sign Up">
            </div>
          </form>

        </div>
      </div>

      <div class="footer">
        <span>¿Who Knows? &copy; 2026</span>
        <a href="/about">About</a>
      </div>
    </div>

    <script src="../javaScript/register_page_script.js" type="module"></script>
  </div>
</body>

</html>
