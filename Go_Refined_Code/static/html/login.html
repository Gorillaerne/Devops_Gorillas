<!doctype html>
<html lang="da">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log In — ¿Who Knows?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <div class="page">
    <div class="navigation">
      <nav>
        <h1>
          <a href="/">¿Who Knows?</a>
        </h1>
        <a id="nav-login" href="/login">Log in</a>
        <a id="nav-register" href="/register">Register</a>
      </nav>
    </div>

    <div class="body" id="body">
      <div class="form-page">
        <div class="form-container">

          <h2>Welcome back.</h2>
          <p class="form-sub">Sign in to continue searching.</p>
          <span class="accent-line"></span>

          <form id="login-form">
            <dl>
              <div>
                <dt>Username</dt>
                <dd>
                  <input type="text" id="username" name="username" size="30" placeholder="Your username" required>
                </dd>
              </div>

              <div>
                <dt>Password</dt>
                <dd>
                  <input type="password" id="password" name="password" size="30" placeholder="••••••••" required>
                </dd>
              </div>
            </dl>
            <div class="actions">
              <input type="submit" id="login-button" value="Log In">
            </div>
          </form>

        </div>
      </div>

      <div class="footer">
        <span>¿Who Knows? &copy; 2026</span>
        <a href="/about">About</a>
      </div>
    </div>

    <script src="../javaScript/login_page_script.js" type="module"></script>
  </div>
</body>

</html>
