services:
  mysql:
    image: mysql:8
    container_name: mysql
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  go-backend:
    image: ghcr.io/gorillaerne/go-backend:latest
    container_name: go-backend
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_PATH: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true
    restart: unless-stopped

  frontend-proxy:
    image: ghcr.io/gorillaerne/frontend-proxy:latest
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - go-backend
volumes:
  mysql_data:
    external: true
    name: go_refined_code_mysql_data
